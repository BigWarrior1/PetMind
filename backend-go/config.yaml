# 数据库配置
db:
  type: "sqlite"                      # 数据库类型: sqlite / postgres
  path: "./data/petmind.db"           # SQLite 数据库路径
  host: "localhost"                   # PostgreSQL 主机
  port: "5432"                        # PostgreSQL 端口
  user: "postgres"                    # PostgreSQL 用户
  password: "postgres"                # PostgreSQL 密码
  name: "petmind"                     # PostgreSQL 数据库名

# AI 服务配置
ai:
  api_url: "http://localhost:8000/api/v1"    # Python FastAPI 服务地址

# 文件上传配置
upload:
  dir: "./data/uploads"                       # 上传文件存储目录

# 服务器配置
server:
  port: "8080"                                # 服务监听端口
